{% extends "base.html" %}

{% block title %}Recuperar Senha | Backup Center{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-4 py-10">
    <div class="w-full max-w-md">
        <div class="flex flex-col items-center text-center">
            <a href="{{ url_for('public.index') }}" class="flex items-center gap-2 mb-6">
                <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-brand-600">
                    <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-2xl font-bold text-gray-900 dark:text-white">Backup Manager</span>
            </a>
            <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">
                Recuperar Senha
            </h2>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                Informe seu email para receber as instrucoes
            </p>
        </div>

        <div class="mt-8 rounded-2xl border border-gray-200 bg-white p-6 shadow-theme-md dark:border-gray-800 dark:bg-gray-900">
            <form class="space-y-6" action="{{ url_for('auth.forgot_password') }}" method="POST">
                {% include 'partials/csrf.html' %}
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        Email cadastrado
                    </label>
                    <div class="mt-1 relative rounded-lg shadow-theme-xs">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required
                            class="w-full rounded-lg border border-gray-300 bg-white pl-10 pr-3 py-2 text-sm text-gray-900 placeholder:text-gray-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100 dark:placeholder:text-gray-500"
                            placeholder="seu@email.com">
                    </div>
                </div>

                <button type="submit"
                    class="w-full btn-premium">
                    Enviar Instrucoes
                </button>
            </form>

            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200 dark:border-gray-800"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white dark:bg-gray-900 text-gray-500">
                            Lembrou sua senha?
                        </span>
                    </div>
                </div>

                <div class="mt-6 text-center">
                    <a href="{{ url_for('auth.login') }}" class="font-medium text-brand-600 hover:text-brand-500">
                        Voltar para o Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
