{% extends "base.html" %}

{% block title %}Novo Plano | Super Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Criar Novo Plano</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Defina os limites e preços do novo pacote</p>
    </div>

    <form method="POST" class="bg-white dark:bg-gray-800 shadow rounded-lg p-6 space-y-6">

    {% include 'partials/csrf.html' %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Nome do
                    Plano</label>
                <input type="text" name="name" id="name" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
            </div>

            <div>
                <label for="slug" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Slug</label>
                <input type="text" name="slug" id="slug" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
            </div>

            <div class="col-span-1 md:col-span-2">
                <label for="description"
                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">Descrição</label>
                <textarea name="description" id="description" rows="2"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm"></textarea>
            </div>

            <div>
                <label for="price_monthly" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Preço
                    Mensal (R$)</label>
                <input type="number" step="0.01" name="price_monthly" id="price_monthly" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
            </div>

            <div>
                <label for="price_yearly" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Preço Anual
                    (R$)</label>
                <input type="number" step="0.01" name="price_yearly" id="price_yearly" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
            </div>

            <div class="col-span-1 md:col-span-2 border-t border-gray-200 dark:border-gray-700 pt-4">
                <h3 class="text-sm font-medium text-gray-900 dark:text-white mb-4">Limites do Plano</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label for="max_devices" class="block text-xs font-medium text-gray-500 dark:text-gray-400">Máx.
                            Dispositivos</label>
                        <input type="number" name="max_devices" id="max_devices" required value="10"
                            class="mt-1 block w-full rounded-md border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
                    </div>
                    <div>
                        <label for="max_users" class="block text-xs font-medium text-gray-500 dark:text-gray-400">Máx.
                            Usuários</label>
                        <input type="number" name="max_users" id="max_users" required value="2"
                            class="mt-1 block w-full rounded-md border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
                    </div>
                    <div>
                        <label for="backup_retention_days"
                            class="block text-xs font-medium text-gray-500 dark:text-gray-400">Retenção (Dias)</label>
                        <input type="number" name="backup_retention_days" id="backup_retention_days" required value="30"
                            class="mt-1 block w-full rounded-md border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
                    </div>
                    <div>
                        <label for="trial_days"
                            class="block text-xs font-medium text-gray-500 dark:text-gray-400">Trial (Dias)</label>
                        <input type="number" name="trial_days" id="trial_days" required value="14"
                            class="mt-1 block w-full rounded-md border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center pt-2">
            <input type="checkbox" name="is_active" id="is_active" checked
                class="h-4 w-4 text-brand-600 focus:ring-brand-500 border-gray-300 rounded dark:bg-gray-700 dark:border-gray-600">
            <label for="is_active" class="ml-2 block text-sm text-gray-900 dark:text-gray-300">
                Plano Ativo para novas assinaturas
            </label>
        </div>

        <div class="flex justify-end space-x-3 pt-4">
            <a href="{{ url_for('superadmin_plans.list_plans') }}"
                class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600">Cancelar</a>
            <button type="submit"
                class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                Criar Plano
            </button>
        </div>
    </form>
</div>
{% endblock %}
