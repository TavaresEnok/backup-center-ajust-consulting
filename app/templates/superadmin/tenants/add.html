{% extends "base.html" %}

{% block title %}Novo Tenant | Super Admin{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Criar Novo Tenant</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Adicione uma nova empresa ao sistema</p>
    </div>

    <form method="POST" class="premium-card p-6 space-y-6">

    {% include 'partials/csrf.html' %}
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Nome da empresa</label>
                <input type="text" name="name" id="name" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
            </div>
            <div>
                <label for="company_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Razão social (opcional)</label>
                <input type="text" name="company_name" id="company_name"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
            </div>
            <div class="md:col-span-2">
                <label for="slug" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Slug (URL)</label>
                <input type="text" name="slug" id="slug" required placeholder="ex: minha-empresa"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
                <p class="mt-1 text-xs text-gray-500">Identificador único na URL (a-z, 0-9 e hífen).</p>
            </div>
        </div>

        <div class="border-t border-gray-200 dark:border-gray-700 pt-4">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Dono do tenant</h3>

            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label for="owner_full_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Nome completo</label>
                    <input type="text" name="owner_full_name" id="owner_full_name" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
                </div>
                <div>
                    <label for="owner_email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">E-mail de acesso</label>
                    <input type="email" name="owner_email" id="owner_email" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
                </div>

                <div>
                    <label for="owner_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Senha inicial</label>
                    <input type="password" name="owner_password" id="owner_password" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
                </div>
            </div>
        </div>

        <div class="flex justify-end space-x-3 pt-4">
            <a href="{{ url_for('superadmin_tenants.list_tenants') }}"
                class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600">Cancelar</a>
            <button type="submit"
                class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                Criar Tenant
            </button>
        </div>
    </form>
</div>
{% endblock %}
