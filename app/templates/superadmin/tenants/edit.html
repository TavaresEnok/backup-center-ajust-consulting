{% extends "base.html" %}

{% block title %}Editar Tenant | Super Admin{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Editar Tenant</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Alterar dados da empresa {{ tenant.name }}</p>
    </div>

    <form method="POST" class="premium-card p-6 space-y-6">

    {% include 'partials/csrf.html' %}
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Nome da empresa</label>
                <input type="text" name="name" id="name" value="{{ tenant.name }}" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
            </div>
            <div>
                <label for="company_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Razão social</label>
                <input type="text" name="company_name" id="company_name" value="{{ tenant.company_name or '' }}"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
            </div>
            <div>
                <label for="slug" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Slug</label>
                <input type="text" name="slug" id="slug" value="{{ tenant.slug }}" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">E-mail do tenant</label>
                <input type="email" name="email" id="email" value="{{ tenant.email }}" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
            </div>
            <div>
                <label for="subscription_status" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Status da assinatura</label>
                <select name="subscription_status" id="subscription_status"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm">
                    <option value="trial" {% if (tenant.subscription_status or '') == 'trial' %}selected{% endif %}>Trial</option>
                    <option value="active" {% if (tenant.subscription_status or '') == 'active' %}selected{% endif %}>Active</option>
                    <option value="past_due" {% if (tenant.subscription_status or '') == 'past_due' %}selected{% endif %}>Past due</option>
                    <option value="canceled" {% if (tenant.subscription_status or '') == 'canceled' %}selected{% endif %}>Canceled</option>
                </select>
            </div>
        </div>

        <div class="flex items-center">
            <input type="checkbox" name="is_active" id="is_active" {% if tenant.is_active %}checked{% endif %}
                class="h-4 w-4 text-brand-600 focus:ring-brand-500 border-gray-300 rounded dark:bg-gray-700 dark:border-gray-600">
            <label for="is_active" class="ml-2 block text-sm text-gray-900 dark:text-gray-300">
                Tenant Ativo (Desmarcar para suspender acesso)
            </label>
        </div>

        <div class="flex justify-end space-x-3 pt-4">
            <a href="{{ url_for('superadmin_tenants.list_tenants') }}"
                class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600">Cancelar</a>
            <button type="submit"
                class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                Salvar Alterações
            </button>
        </div>
    </form>
</div>
{% endblock %}
