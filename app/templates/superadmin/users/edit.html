{% extends "base.html" %}

{% block title %}Editar Usuario | Super Admin{% endblock %}

{% block content %}
{% set is_platform = not user.tenant_id %}
<div class="mx-auto max-w-3xl space-y-5 pb-4">
    <div>
        <h1 class="text-2xl font-bold text-[var(--text-main)]">Editar usuario</h1>
        <p class="text-sm text-[var(--text-muted)]">Atualize acesso e vinculo de tenant.</p>
    </div>

    <form method="POST" class="premium-card space-y-5 p-5" x-data="{ scope: '{{ 'platform' if is_platform else 'tenant' }}' }">
        {% include 'partials/csrf.html' %}

        <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
            <label class="flex items-center gap-2 rounded-lg border border-[var(--card-border)] px-3 py-2 text-sm text-[var(--text-main)]">
                <input type="radio" name="user_scope" value="tenant" x-model="scope" class="h-4 w-4">
                Usuario de tenant
            </label>
            <label class="flex items-center gap-2 rounded-lg border border-[var(--card-border)] px-3 py-2 text-sm text-[var(--text-main)]">
                <input type="radio" name="user_scope" value="platform" x-model="scope" class="h-4 w-4">
                Admin da plataforma
            </label>
        </div>

        <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
            <div>
                <label for="full_name" class="block text-sm font-medium text-[var(--text-main)]">Nome</label>
                <input type="text" name="full_name" id="full_name" value="{{ user.full_name }}" required
                    class="mt-1 block w-full rounded-lg border border-[var(--card-border)] bg-[var(--card-bg)] px-3 py-2 text-sm text-[var(--text-main)]">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-[var(--text-main)]">E-mail</label>
                <input type="email" name="email" id="email" value="{{ user.email }}" required
                    class="mt-1 block w-full rounded-lg border border-[var(--card-border)] bg-[var(--card-bg)] px-3 py-2 text-sm text-[var(--text-main)]">
            </div>
        </div>

        <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
            <div>
                <label for="password" class="block text-sm font-medium text-[var(--text-main)]">Nova senha (opcional)</label>
                <input type="password" name="password" id="password" minlength="6"
                    class="mt-1 block w-full rounded-lg border border-[var(--card-border)] bg-[var(--card-bg)] px-3 py-2 text-sm text-[var(--text-main)]">
            </div>
            <div x-show="scope === 'tenant'" x-cloak>
                <label for="role" class="block text-sm font-medium text-[var(--text-main)]">Funcao no tenant</label>
                <select name="role" id="role"
                    class="mt-1 block w-full rounded-lg border border-[var(--card-border)] bg-[var(--card-bg)] px-3 py-2 text-sm text-[var(--text-main)]">
                    {% for role in tenant_roles %}
                    <option value="{{ role.value }}" {% if user.role == role %}selected{% endif %}>{{ role_labels[role] }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div x-show="scope === 'tenant'" x-cloak>
            <label for="tenant_id" class="block text-sm font-medium text-[var(--text-main)]">Tenant</label>
            <select name="tenant_id" id="tenant_id"
                class="mt-1 block w-full rounded-lg border border-[var(--card-border)] bg-[var(--card-bg)] px-3 py-2 text-sm text-[var(--text-main)]">
                <option value="">Selecione...</option>
                {% for tenant in tenant_options %}
                <option value="{{ tenant.id }}" {% if selected_tenant_id and tenant.id == selected_tenant_id %}selected{% endif %}>
                    {{ tenant.name }} ({{ tenant.slug }})
                </option>
                {% endfor %}
            </select>
        </div>

        <label class="flex items-center gap-2 rounded-lg border border-[var(--card-border)] px-3 py-2 text-sm text-[var(--text-main)]">
            <input type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %} class="h-4 w-4 rounded border-[var(--card-border)]">
            Usuario ativo
        </label>

        <div class="flex flex-wrap justify-end gap-2 pt-2">
            <a href="{{ url_for('superadmin_users.list_users') }}"
                class="rounded-lg border border-[var(--card-border)] px-4 py-2 text-sm font-medium text-[var(--text-main)] hover:bg-[var(--line-color)]">
                Cancelar
            </a>
            <button type="submit"
                class="rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-700">
                Salvar alteracoes
            </button>
        </div>
    </form>
</div>
{% endblock %}
